name: Release

# Cut a release by pushing a SemVer tag, e.g.:
#   git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # allow the workflow to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Test
        run: dotnet run --project tests/Capper.Tests/Capper.Tests.csproj -c Release

      # The tag is the source of truth for the version: v1.2.3 -> 1.2.3.
      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Self-contained single-file Capper.exe (no runtime needed on the user's machine).
      - name: Publish
        run: dotnet publish Capper.csproj -c Release -p:Version=${{ steps.ver.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/net9.0-windows10.0.19041.0/win-x64/publish/Capper.exe
          generate_release_notes: true
          # Tags containing a hyphen (e.g. v1.1.0-rc.1) are marked as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
