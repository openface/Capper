name: Release

# Cut a release by pushing a SemVer tag, e.g.:
#   git tag v1.1.0 && git push origin v1.1.0
# Velopack builds an installer (Capper-win-Setup.exe) plus full/delta update packages and a
# release manifest, then publishes them to the GitHub Release. Installed users auto-update from these.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # allow the workflow to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Test
        run: dotnet run --project tests/Capper.Tests/Capper.Tests.csproj -c Release

      # The tag is the source of truth for the version: v1.2.3 -> 1.2.3.
      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      # Self-contained publish into a folder (Velopack packs the folder; not single-file).
      - name: Publish
        run: dotnet publish Capper.csproj -c Release -r win-x64 -o publish -p:Version=${{ steps.ver.outputs.version }}

      # Pull the current latest release so vpk can generate a small delta against it.
      # First-ever release has nothing to download, so this is allowed to fail.
      - name: Download previous release (for deltas)
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack
        run: >
          vpk pack
          --packId Capper
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish
          --mainExe Capper.exe
          --packTitle Capper
          --packAuthors openface
          --icon Capper.ico

      # Tags containing a hyphen (e.g. v1.1.0-rc.1) are published as GitHub pre-releases.
      - name: Upload to GitHub Release
        shell: bash
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --releaseName "Capper ${{ steps.ver.outputs.version }}"
          --tag ${{ github.ref_name }}
          --merge --publish
          $([[ "${{ github.ref_name }}" == *-* ]] && echo --pre)
